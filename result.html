<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 B랭크로그 | BrankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; 
            color: #ecf0f1;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container { width: 100%; max-width: 1100px; display: none; }
        .header-zone { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #21262d; }
        .brand-logo-area { display: flex; align-items: center; gap: 10px; }
        .brand-logo-area img { height: 28px; width: auto; display: block; }
        .brand-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #ffffff; text-transform: uppercase; }
        .header-meta-line { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 5px; }
        .header-meta-line h2 { font-size: 16px; font-weight: 600; margin: 0; color: #c9d1d9; }
        .header-meta-line h2 span { color: #03cf5d; font-weight: 700; }
        .timestamp { font-size: 13px; color: #8b949e; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1.1fr 1.2fr; gap: 20px; }
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .card-title { font-size: 14px; font-weight: 600; color: #8b949e; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
        .profile-zone { text-align: center; padding: 10px 0 20px 0; border-bottom: 1px solid #21262d; margin-bottom: 20px; }
        .profile-avatar { width: 50px; height: 50px; background: #21262d; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 10px; border: 1px solid #30363d; }
        .profile-id { font-size: 18px; font-weight: 700; color: #ffffff; margin: 0 0 8px 0; }
        .profile-tag { font-size: 12px; color: #03cf5d; background: rgba(3, 207, 93, 0.08); border: 1px solid rgba(3, 207, 93, 0.2); padding: 6px 14px; border-radius: 6px; display: inline-block; max-width: 100%; box-sizing: border-box; word-break: break-all; line-height: 1.4; font-weight: 500; }

        .meta-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
        .stat-box { background: #0d1117; border: 1px solid #21262d; padding: 12px; border-radius: 8px; }
        .stat-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; color: #ffffff; }

        .jisu-display { text-align: center; padding: 5px 0; }
        .gauge-subtext { font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        .main-grade-text { font-size: 32px; font-weight: 800; color: #03cf5d; margin: 0 0 20px 0; text-shadow: 0 0 15px rgba(3, 207, 93, 0.25); }
        .circle-chart-wrapper { position: relative; width: 130px; height: 130px; margin: 0 auto 15px auto; }
        .circle-chart { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#03cf5d 0%, #21262d 0% 100%); display: flex; align-items: center; justify-content: center; transition: background 0.5s ease-in-out; }
        .circle-chart-inner { width: 102px; height: 102px; background: #161b22; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .circle-score { font-size: 24px; font-weight: 800; color: #ffffff; }
        .circle-label { font-size: 11px; color: #8b949e; margin-top: 1px; }
        .analysis-status-badge { font-size: 12px; color: #8b949e; background: #0d1117; padding: 6px 14px; border-radius: 8px; border: 1px solid #21262d; display: inline-block; margin-bottom: 20px; }

        .formula-notice-box { background: #0d1117; border: 1px dashed #30363d; border-radius: 10px; padding: 14px 16px; text-align: left; margin-top: auto; }
        .formula-title { font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; margin: 0 0 6px 0; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; }
        .formula-text { font-size: 11px; color: #6e7681; line-height: 1.5; margin: 0; word-break: break-all; }

        .post-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        /* 🌟 제목 영역과 날짜 영역을 양끝으로 칼정렬하는 기본 스타일 */
        .post-item { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 14px 16px; border-radius: 10px; border: 1px solid #21262d; box-sizing: border-box; }
        .post-left-box { display: flex; align-items: center; overflow: hidden; max-width: 80%; }
        .post-badge { background: #21262d; color: #03cf5d; font-size: 12px; font-weight: 700; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .post-content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; margin-left: 12px; }
        .post-content a { color: #c9d1d9; text-decoration: none; font-weight: 500; }
        .post-content a:hover { color: #03cf5d; text-decoration: underline; }
        .post-date-label { color: #8b949e; font-size: 12px; font-family: monospace; flex-shrink: 0; margin-left: 10px; }

        /* 🌟 채널 성향 결과 리포트 레이아웃 전용 디자인 가이드 CSS */
        .tendency-box { background: #0d1117; border: 1px solid #21262d; border-radius: 10px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .tendency-icon { font-size: 20px; }
        .tendency-details { text-align: left; }
        .tendency-label { font-size: 11px; color: #8b949e; margin-bottom: 2px; }
        .tendency-value { font-size: 14px; font-weight: 700; color: #ffffff; }
        .desc-notice-box { font-size: 13px; color: #c9d1d9; line-height: 1.6; text-align: left; margin-bottom: 20px; padding: 0 4px; word-break: keep-all; }
        .badge-zone-wrapper { background: #0d1117; border: 1px solid #21262d; border-radius: 10px; padding: 12px 14px; margin-bottom: 25px; display: flex; align-items: center; justify-content: flex-start; gap: 15px; font-size: 12px; font-weight: 600; }
        .badge-title { color: #8b949e; }
        .badge-item { display: flex; align-items: center; gap: 5px; color: #ffffff; }
        .badge-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

        /* 🌟 다른 아이디 조회하기 버튼을 위한 정밀 CSS 레이아웃 구조 */
        .actions-zone { 
            margin-top: 35px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
        }
        .back-btn { 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px 32px; 
            background-color: #161b22; 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600; 
            border-radius: 8px; 
            border: 1px solid #30363d; 
            transition: background 0.2s, border-color 0.2s; 
        }
        .back-btn:hover { 
            background-color: #30363d; 
            border-color: #8b949e; 
        }
        
        .loader-wrapper { text-align: center; padding: 60px 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #03cf5d; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="spinner"></div>
        <b style="color: #8b949e; font-size: 15px;">네이버 블로그 실시간 빅데이터 지표 분석 중...</b>
    </div>

    <div id="dashboard" class="dashboard-container">
        <div class="header-zone">
            <div class="brand-logo-area">
                <img src="logo.svg" alt="BrankLog Logo">
                <span class="brand-text">Brank<span style="color: #03cf5d;">Log.</span></span>
            </div>
            <div class="header-meta-line">
                <h2><span id="headerId">-</span> 님 분석 리포트</h2>
                <div id="currentTime" class="timestamp">-</div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <p class="card-title" id="infoTitle">ℹ️ 블로그 정보</p>
                <div class="profile-zone">
                    <div class="profile-avatar" id="avatarIcon">📁</div>
                    <p id="displayId" class="profile-id">-</p>
                    <span id="blogGreeting" class="profile-tag">네이버 블로그</span>
                </div>
                <div class="meta-stats">
                    <div class="stat-box">
                        <div class="stat-label" id="sourceLabel">분석 데이터 소스</div>
                        <div id="realtimeDataSource" class="stat-value" style="color: #03cf5d; font-size: 14px;">네이버 실시간 RSS</div>
                    </div>
                    <div
