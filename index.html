
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B랭크로그 | 마케팅 지수 조회</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .search-container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { font-size: 24px; margin-bottom: 25px; font-weight: 800; }
        h1 span { color: #388bfd; }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        input {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #388bfd; }
        button {
            background-color: #388bfd;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #1f6feb; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Brank<span>Log(PLACE).</span></h1>
        <div class="input-group">
            <input type="text" id="placeInput" placeholder="네이버 플레이스 상호명을 입력하세요" onkeypress="if(event.keyCode==13) handleSearch()">
            <button onclick="handleSearch()">플레이스 마케팅 지수 조회</button>
        </div>
    </div>

    <script>
        function handleSearch() {
            const inputValue = document.getElementById('placeInput').value.trim();
            if (!inputValue) {
                alert('상호명을 입력해 주세요.');
                return;
            }
            // 🚀 핵심: 플레이스 전용 파라미터(placeQuery)를 붙여 결과 페이지로 전송
            window.location.href = `result.html?placeQuery=${encodeURIComponent(inputValue)}`;
        }
    </script>
</body>
</html>
